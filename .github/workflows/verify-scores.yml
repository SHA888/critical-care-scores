name: verify-scores

# Citation contract + calculation contract + dual-engine golden vectors, then
# build & deploy the calculator to GitHub Pages on push to the default branch.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Citation contract (SCORES.md)
        run: uv run --no-project python tools/verify_scores.py SCORES.md --max-unverified 161

      - name: Calculation contract (scores/*.json — schema + refs + golden vectors)
        run: uv run --no-project --with jsonschema python tools/verify_definitions.py

      - name: Python reference engine — golden vectors
        run: uv run --no-project --with pytest python -m pytest engine/tests -q

      - name: Check cited DOIs (informational; blocker pre-release)
        if: github.event_name == 'push'
        continue-on-error: true
        run: uv run --no-project python tools/verify_scores.py SCORES.md --max-unverified 161 --check-dois

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: TypeScript engine — same golden vectors + typecheck
        working-directory: web
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Build SPA
        working-directory: web
        env:
          BASE_PATH: /critical-care-scores/
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
